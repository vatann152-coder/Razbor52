<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Автозапчасти — Каталог</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="header">
        <div class="container">
            <div class="header-content">
                <div class="logo">
                    <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
                        <rect width="40" height="40" rx="8" fill="#2563eb"/>
                        <path d="M10 25h20M12 20h16M14 15h12" stroke="white" stroke-width="2" stroke-linecap="round"/>
                        <circle cx="20" cy="20" r="6" stroke="white" stroke-width="2"/>
                    </svg>
                    <span>АвтоЗапчасти</span>
                </div>
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="Поиск по названию или номеру...">
                    <svg class="search-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8"/>
                        <path d="M21 21l-4.35-4.35"/>
                    </svg>
                </div>
            </div>
        </div>
    </header>

    <main class="main">
        <div class="container">
            <div class="stats-bar" id="statsBar">
                <span id="totalCount">Загрузка...</span>
            </div>

            <div class="filters">
                <button class="filter-btn active" data-filter="all">Все</button>
                <button class="filter-btn" data-filter="engine">Двигатель</button>
                <button class="filter-btn" data-filter="transmission">Трансмиссия</button>
                <button class="filter-btn" data-filter="brakes">Тормоза</button>
                <button class="filter-btn" data-filter="suspension">Подвеска</button>
                <button class="filter-btn" data-filter="electrical">Электрика</button>
            </div>

            <div class="catalog-grid" id="catalogGrid">
                <div class="loading">
                    <div class="spinner"></div>
                    <p>Загрузка каталога...</p>
                </div>
            </div>

            <div class="empty-state" id="emptyState" style="display: none;">
                <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <circle cx="11" cy="11" r="8"/>
                    <path d="M21 21l-4.35-4.35"/>
                    <path d="M8 11h6"/>
                </svg>
                <h3>Ничего не найдено</h3>
                <p>Попробуйте изменить поисковый запрос</p>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <p>© 2026 Автозапчасти. Каталог обновляется автоматически.</p>
        </div>
    </footer>

    <!-- Модальное окно для заказа -->
    <div class="modal" id="orderModal">
        <div class="modal-content">
            <button class="modal-close" id="modalClose">&times;</button>
            <h2>Заказать запчасть</h2>
            <div class="modal-product" id="modalProduct"></div>
            <form id="orderForm">
                <div class="form-group">
                    <label>Ваше имя</label>
                    <input type="text" required placeholder="Иван Иванов">
                </div>
                <div class="form-group">
                    <label>Телефон</label>
                    <input type="tel" required placeholder="+7 (999) 123-45-67">
                </div>
                <div class="form-group">
                    <label>Количество</label>
                    <input type="number" min="1" value="1" id="quantityInput">
                </div>
                <button type="submit" class="btn-submit">Отправить заявку</button>
            </form>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
